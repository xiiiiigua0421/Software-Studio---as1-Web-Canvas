<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Canvas Drawing App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar tools-panel">
            <div class="tool-grid">
                <button class="tool-btn active" id="btn-cursor" title="Cursor (安全游標)">↖️</button>
                <button class="tool-btn" id="btn-text" title="Text">T</button>
                <button class="tool-btn" id="btn-brush" title="Brush">✏️</button>
                <button class="tool-btn" id="btn-eraser" title="Eraser">🧽</button>
                <button class="tool-btn" id="btn-undo" title="Undo">↩️</button>
                <button class="tool-btn" id="btn-redo" title="Redo">↪️</button>
                <button class="tool-btn" id="btn-rect" title="Rectangle (按住 Ctrl 畫正方形)">☐</button>
                <button class="tool-btn" id="btn-circle" title="Circle (按住 Ctrl 畫正圓)">◯</button>
                <button class="tool-btn" id="btn-triangle" title="Triangle (按住 Ctrl 鎖定比例)">△</button>
                <button class="tool-btn" id="btn-image" title="Image (按住 Ctrl 鎖定比例)">🖼️</button>
                <button class="tool-btn" id="btn-eyedropper" title="Eyedropper (吸管)">💉</button>
                <button class="tool-btn" id="btn-bucket" title="Bucket (油漆桶)">🪣</button>
            </div>

            <div class="custom-color-picker">
                <div class="picker-area">
                    <canvas id="color-block" width="120" height="120"></canvas>
                    <canvas id="color-strip" width="20" height="120"></canvas>
                </div>
                <div class="preview-area">
                    <div id="color-preview" class="color-circle"></div>
                    <span id="color-text">rgb(0, 0, 0)</span>
                </div>
                <div class="rgb-sliders">
                    <label>R <input type="range" id="slider-r" min="0" max="255" value="0"></label>
                    <label>G <input type="range" id="slider-g" min="0" max="255" value="0"></label>
                    <label>B <input type="range" id="slider-b" min="0" max="255" value="0"></label>
                </div>
            </div>

            <div class="size-picker vertical-slider">
                <label for="brush-size">Size</label>
                <span id="size-display">5</span>
                <input type="range" id="brush-size" min="1" max="50" value="5" orient="vertical">
            </div>
        </aside>

        <main class="canvas-area">
            <header class="top-bar">
                <div class="resize-controls">
                    <label>W: <input type="number" id="input-width" value="700" step="50" min="100" max="2000"></label>
                    <label>H: <input type="number" id="input-height" value="500" step="50" min="100" max="2000"></label>
                    <button class="action-btn" id="btn-resize">Resize</button>
                    <button class="action-btn" id="btn-rotate" title="Rotate 90°">↻ Rotate</button>
                </div>
                <div>
                    <button class="action-btn" id="btn-refresh">refresh🔄</button>
                    <button class="action-btn" id="btn-download">download⬇️</button>
                </div>
            </header>

            <div id="canvas-container">
                <div id="canvas-bg"></div> 
                <canvas id="layer0" width="700" height="500"></canvas>
                <canvas id="layer1" width="700" height="500"></canvas>
                
                <canvas id="temp-canvas" width="700" height="500" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10;"></canvas>
                
                <div id="custom-cursor"></div>
            </div>
        </main>

        <aside class="sidebar right-panel">
            <div class="section">
                <h3>Layers</h3>
                <ul id="layer-list">
                    <li class="layer-item active" data-layer="1">
                        <span>Layer 1</span>
                        <div>
                            <button class="icon-btn btn-toggle-vis" title="顯示/隱藏">👁️</button>
                            <button class="icon-btn btn-clear-layer" title="清除此圖層">🗑️</button>
                        </div>
                    </li>
                    <li class="layer-item" data-layer="0">
                        <span>Layer 0</span>
                        <div>
                            <button class="icon-btn btn-toggle-vis" title="顯示/隱藏">👁️</button>
                            <button class="icon-btn btn-clear-layer" title="清除此圖層">🗑️</button>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="section" id="text-settings">
                <h3>Text Settings</h3>
                <select id="font-family">
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
                <br><br>
                <label>Size: <input type="number" id="font-size" value="24" min="10" max="100"></label>
            </div>
        </aside>
    </div>
    <script src="app.js"></script>
</body>
</html>
